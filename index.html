    <style>

} .dialogi{

        width: 300px;

    border-collapse: collapse;
    font-size: 40px;
} #importtodos{
    min-width: 800px;
    min-height: 200px;

</head>
<body>
            <button id="sidebtn" onclick="showImport()"></button>
            <div id="message">JSON copied to clipboard!</div>
            <div id="navi">
                <div id="navibtn" onclick="changeView(1)">Schedule</div>
                <div id="navibtn2" onclick="changeView(2)">To Do</div>
            </div>
        <div id="container"> <!--------------------------------------------------------------->
            <div id="controls" class="bigsection" style="height: 625px;">
                <div class="smallsection"> <!-- time -->
                    <p>Time:</p>
                    <input
                        type="time"
                        id="timeinput">
                </div>
                <div class="smallsection"> <!-- length -->
                    <p>Length:</p>
                    <p style="float: right; margin-right: 50px; margin-left: 0; text-align: center; width: 200px;">min</p>
                    <input id="minuteinput" style="margin-right: 0; width: 250px;" >
                </div>
                <div class="smallsection"> <!-- name -->
                    <p>Name:</p>
                    <input id="tasknameinput">
                </div>
                <div class="smallsection"> <!-- buttons top -->
                    <button onclick="addTask(
                        tasknameinput.value,
                        Number(minuteinput.value),
                        timeinput.value
                        )"
                        >Add
                    </button>
                    <button onclick="clearTasks()">Clear</button>
                    <button onclick="copyToClipboard()">Export</button>
                    <button onclick="showImport()">Import</button>
                </div>
                <div class="smallsection"> <!-- buttons bottom -->
                    <button onclick="delayTasks(10)">+10m</button>
                    <button onclick="delayTasks(60)">+1h</button>
                    <button onclick="delayTasks(-10)">-10m</button>
                    <button onclick="delayTasks(-60)">-1h</button>
                </div>
            </div>
            <div id="mainscreen" class="bigsection" style="height: 375px;">
                <button id="hidebtn" onclick="hideControls()">∧</button>
                <div id="clockscreen" class="bigsection"></div>
            </div>
            <div style='overflow: scroll;' class="bigsection">
                <table id="taskslist"></table>
            </div>
            <div id="popupscreen">
                <textarea id="importstr" style="font-size: 50px; max-width: 600px; min-width: 600px; margin-left: 50px; margin-top: 50px; min-height: 200px; max-height: 600px; height: 600px;"></textarea>
                <button class="btn" onclick="pasteImport()">Import</button>
                <button class="btn" onclick="showImport()">Close</button>
            </div>
        </div>
        <div id="container2"> <!--------------------------------------------------------------->
            <div id="controls" class="bigsection" style="height: 625px;">
                <div class="smallsection"> <!-- name -->
                    <p>Name:</p>
                    <input id="todonameinput">
                </div>
                <div class="smallsection"> <!-- name -->
                    <p title="How often to do it">Days:</p>
                    <input size="60px" id="daysinput">
                </div>
                <div class="smallsection"> <!-- buttons top -->
                    <button onclick="addToDo(
                        todonameinput.value,
                        daysinput.value
                        )"
                        >Add
                    </button>
                    <button onclick="clearTodosDialog()">Clear</button>
                    <button onclick="copyTodos()">Export</button>
                    <button onclick="importTodos()">Import</button>
                </div>
                <textarea id="importtodos"></textarea>
            </div>
            <div style='overflow: scroll; height:900px;' class="bigsection">
                <table id="todoslist"></table>
            </div>
        </div>
<script>
    if(localStorage.length == 0){
        localStorage.setItem("tasks", "[]")
        localStorage.setItem("todos", "[]")
    }

    let nextFreeTime;
    let startTimeChosen = false
    let listItemCount; // gets value with getTasks function
    let currentTask = -1
    let nextTask = -1
    let timeInterval;
    let tasks = [
        // taskName
        // startTime
        // endTime
        // timeText
        // taskNumber
    ]
    let todos = [
        // todoName
        // endDate
        // lengthDays
        // id
    ]
let secondsRemaining;
let currentView = 1;
let flags = {
    controlsHidden: false,
    dialogHidden: true,
    intervalIsRunning: false,
    textareaShown : false,
}
let addTask=(name, length, startTimeStr)=>{
    let nowUnixMins = Math.floor((new Date).getHours()*60+(new Date).getMinutes());
        if(length > 0){
            if(name == ""){
                name = `Task ${tasks.length+1}`
            }
            if(!startTimeChosen){
                let h = startTimeStr.substring(0,2)
                let m = startTimeStr.substring(3)
                if(h == "" || m == ""){
                    nextFreeTime = nowUnixMins;
                }
                else{
                    nextFreeTime = Number(h)*60+Number(m);
                }
                startTimeChosen = true
            }
            else{
                nextFreeTime = tasks[tasks.length-1].endTime
            }

            let hoursStr = String(Math.floor(nextFreeTime/60)%24).padStart(2, "0")
            let minsStr = String(nextFreeTime%60).padStart(2, "0")
            let endHoursStr = String(Math.floor((nextFreeTime + length)/60)%24).padStart(2, "0")
            let endMinsStr = String((nextFreeTime + length)%60).padStart(2, "0")
            tasks.push({
                taskName : name,
                startTime : nextFreeTime,
                endTime : nextFreeTime + length,
                timeText : `${hoursStr}:${minsStr} - ${endHoursStr}:${endMinsStr}`,
                taskNumber : listItemCount+1
            })
            
            createList()
        }
                    
        listItemCount++
        searchTask()
        updateStorage()
}
let createList=()=>{
    if(JSON.stringify(tasks) != "[]" && JSON.stringify(tasks) != "null"){
        taskslist.innerHTML = ""
        for(let i = 0; i < tasks.length; i++){
                taskslist.innerHTML += `<tr><td>${tasks[i].taskName}</td><td>${tasks[i].timeText}</td><td><button onclick="deleteTask(${tasks[i].taskNumber})">x</botton></td></tr>`
        }
    }
    else{
        taskslist.innerHTML = ""
    }
}
let clearTasks=()=>{
    startTimeChosen = false;
    tasks = []
    createList()
    updateStorage()
    searchTask();
    messageAlert("Tasks cleared")
}
const deleteTask=(taskID)=>{
    tasks = tasks.filter((data)=> data.taskNumber != taskID)
    if(tasks.length == 0){
        startTimeChosen = false
    }
    createList()
    updateStorage()
    searchTask();
}
const searchTask = () => {
    currentTask = -1
    nextTask = -1
    getTasks()
    let nowUnixMins = Math.floor((new Date).getHours()*60+(new Date).getMinutes());
    if(tasks.length > 0){
        for(let i = 0; i < tasks.length; i++){  //find ongoing task
            if (tasks[i].startTime <= nowUnixMins && tasks[i].endTime > nowUnixMins) {
                currentTask = tasks[i]
                secondsRemaining = (currentTask.endTime-nowUnixMins)*60 - (new Date).getTime()/1000%60;
                break;
            }
        }
        for(let i = 0; i < tasks.length; i++){  //find next task
            if (tasks[i].startTime > nowUnixMins) {
                nextTask = tasks[i]
                secondsRemaining = (nextTask.startTime-nowUnixMins)*60 - (new Date).getTime()/1000%60;
                break;
            }
        }
        if(!flags.intervalIsRunning){     // prevent multiple simultaneous intervals
            if(currentTask == -1 && nextTask == -1){ // no interval if tasks done
                clockscreen.innerHTML = `Tasks completed`
            }
            else{
                showTime()
                timeInterval = setInterval(showTime, 1000)
                flags.intervalIsRunning = true
            }
        }
    }
    else{
        // message.innerHTML = "task list empty!"
    }

}
const showTime=()=>{
    if(currentTask == -1){
        curr = "None"
    }
    else{
        curr = currentTask.taskName
    }
    if(nextTask == -1){
        nex = "finished"
    }
    else{
        nex = nextTask.taskName
    }
    if(currentTask != -1 || nextTask != -1){
        if(secondsRemaining < 3600){
            clockscreen.innerHTML = `${curr}: ${String(Math.floor(secondsRemaining/60)).padStart(2, "0")}:${String(Math.floor(secondsRemaining%60)).padStart(2, "0")} until ${nex}`
        }
        else{
            clockscreen.innerHTML = `${curr}: ${Math.floor(secondsRemaining/3600)}:${String(Math.floor(secondsRemaining/60)%60).padStart(2, "0")}:${String(Math.floor(secondsRemaining%60)).padStart(2, "0")} until ${nex}`
        }
    }
    else{
        clockscreen.innerHTML = `Tasks completed`
    }

    if(secondsRemaining > 0 && tasks.length > 0){ // task ongoing
        secondsRemaining --;
    }
    else{ // task ended, perform search
        clearInterval(timeInterval)
        flags.intervalIsRunning = false
        searchTask()
    }
}
const updateStorage=()=>{
    if(currentView == 1){
        localStorage.setItem("tasks", JSON.stringify(tasks))
    }
    else{
        localStorage.setItem("todos", JSON.stringify(todos))
    }
}
const getTasks=()=>{
        console.log("tasks exist!")
        if(tasks.length == 0 && localStorage.getItem("tasks") != "[]"){
            // none in array, but LS not empty
            tasks = JSON.parse(localStorage.getItem("tasks"))
            createList()
            startTimeChosen = true
        }
        else if(tasks.length == 0){
            // none in array or LS empty
            // message.innerHTML = "No tasks available."
            listItemCount = 0
        }
        if(tasks.length > 0){
            nextFreeTime = tasks[tasks.length-1].endTime
            listItemCount = tasks[tasks.length-1].taskNumber
        }
}
const hideControls=()=>{
    if(flags.controlsHidden){
        controls.style.display = "block"
        hidebtn.innerHTML = "∧"
        flags.controlsHidden = false
    }
    else{
        controls.style.display = "none"
        hidebtn.innerHTML = "∨"
        flags.controlsHidden = true
    }
}
const copyToClipboard=()=>{
    navigator.clipboard.writeText(JSON.stringify(tasks))
    messageAlert("Tasks copied to clipboard!")
}
const pasteImport=()=>{
    try{
        tasks = JSON.parse(importstr.value)
        showImport()
        updateStorage()
        createList()
        messageAlert("Successfully imported")
    }
    catch{
        messageAlert("Syntax error", "rgba(119, 12, 12, 0.7)")
    }
}
const showImport=()=>{
    document.getElementById("importstr").focus()
    importstr.value = ""
    if(flags.dialogHidden){
        sidebtn.style.display = "block"
        popupscreen.style.display = "block"
        flags.dialogHidden = false
    }
    else{
        sidebtn.style.display = "none"
        popupscreen.style.display = "none"
        flags.dialogHidden = true
    }
  importstr.focus();
}
const delayTasks=(amount)=>{
    for(let i=0; i<tasks.length; i++){
        tasks[i].startTime += amount
        tasks[i].endTime += amount
        if(tasks[i].startTime > 1440){
            tasks[i].startTime -= 1440
        }
        if(tasks[i].endTime > 1440){
            tasks[i].endTime -= 1440
        }
        
        let hoursStr = String(Math.floor((tasks[i].startTime)/60)%24).padStart(2, "0")
        let minsStr = String((tasks[i].startTime)%60).padStart(2, "0")
        let endHoursStr = String(Math.floor(((tasks[i].endTime))/60)%24).padStart(2, "0")
        let endMinsStr = String(((tasks[i].endTime))%60).padStart(2, "0")
        tasks[i].timeText = `${hoursStr}:${minsStr} - ${endHoursStr}:${endMinsStr}`
    }
    createList()
    updateStorage()
}
const changeView=(view)=>{
    localStorage.setItem("view", view);
    switch(view){
        case 1:
            container.style.display = "block"
            container2.style.display = "none"
            navibtn.style.backgroundColor = "blueviolet"
            navibtn2.style.backgroundColor = "rgb(97, 31, 160)"
            break;
        case 2:
            container.style.display = "none"
            container2.style.display = "block"
            navibtn.style.backgroundColor = "rgb(97, 31, 160)"
            navibtn2.style.backgroundColor = "blueviolet"
            break;
    }
    currentView = view;
}
const addToDo=(name, days)=>{
    let now = Math.floor((new Date().getTime())/86400000)
    let idArray = []
    if(todos.length > 0){
        for(let i in todos){
            idArray[i] = todos[i].id
        }
    }
    else{
        idArray = [0]
    }
    if(isNaN(days) || days <= 0){
        days = 7;
    }
    if(!Number.isInteger(Number(days))){
        messageAlert(`${days} ≈ ${Math.ceil(days)}`)
        days = Math.ceil(days)
    }
    if(name == ""){
        name = "Task "+(Math.max(...idArray)+1)
    }
    todos.push({
        todoName : name,
        endDate : Number(now) + Number(days),
        lengthDays: days,
        id : idArray.length > 0? (Math.max(...idArray)+1) : 1
    })
    createTodos()
    updateStorage()
    console.log(JSON.stringify(todos))
}
const createTodos=()=>{
    if(JSON.stringify(todos) != "[]" && JSON.stringify(todos) != "null"){
        let now = Math.floor((new Date().getTime())/86400000);
        todos = todos.sort((a,b)=>b.lengthDays-a.lengthDays).sort((a,b)=>a.endDate-b.endDate)
        todoslist.innerHTML = ""
        for(let i = 0; i < todos.length; i++){
            let toGo = todos[i].endDate-now;
            let toDo = todos[i].todoName
            let bgColor = "rgb(139, 59, 59)"; // red
            if(toGo / todos[i].lengthDays > 0.1){
                bgColor = "rgb(84, 139, 59)" // green
            }else if(toGo >= 0){
                bgColor = "rgb(139, 124, 59)" // yellow
            }
            if(toDo.length > 12){
                toDo = toDo.substring(0,11)+"..."
            }
            todoslist.innerHTML += `<tr style="background-color:${bgColor};">
                                        <td title="${todos[i].todoName}">${toDo} <i></i></td>
                                        <td style="color:rgb(192, 192, 192); font-size:30px">(${Math.round(todos[i].lengthDays)}d)</td>
                                        <td>${Math.round(toGo)}d</td>
                                        <td><button style="width:80px" onclick="resetTodoDialog(${todos[i].id})"">✓</button></td>
                                        <td><button style="width:80px" onclick="deletionDialog(${todos[i].id})">x</button></td>
                                    </tr>`
        }
    }
    else{
        todoslist.innerHTML = ""
    }
}
const clearTodosDialog=()=>{
    document.body.innerHTML += `<div id="cleartodospopup" class="dialogi">Clear ToDos?<br>
                                    <button
                                        onclick="clearTodos(false)"
                                        >
                                        Sure.
                                    </button>
                                    <button
                                        onclick="clearTodos(true)"
                                        >
                                        Nah.
                                    </button>
                                </div>`
}
const clearTodos=(abort)=>{
    if(!abort){
        todos = [];
        todoslist.innerHTML = ""
        messageAlert("Todos cleared!")
        updateStorage();
    }
    cleartodospopup.remove()
}
const copyTodos=()=>{
    navigator.clipboard.writeText(JSON.stringify(todos))
    messageAlert("Todos copied!")
}
const getTodos=()=>{
    if(localStorage.getItem("todos")!= null){
        todos = JSON.parse(localStorage.getItem("todos"))
    }
    createTodos()
}
const chooseView=()=>{
    if(localStorage.getItem("view") != null){
        changeView(Number(localStorage.getItem("view")))
    }else{
        changeView(1)
    }
}
const deletionDialog=(id)=>{
    let taskToDelete = "";
    for(let i in todos){
        if(todos[i].id == id){
            taskToDelete = todos[i].todoName
        }
    }
    if(taskToDelete.length > 13){
        console.log(taskToDelete.length)
        taskToDelete = taskToDelete.substring(0,12)+"..."
    }
    document.body.innerHTML += `<div id="deletionpopup" class="dialogi">Delete ${taskToDelete}?<br>
                                    <button
                                        onclick="deleteTodo(${id}, false)"
                                        >
                                        Sure.
                                    </button>
                                    <button
                                        onclick="deleteTodo(${id}, true)"
                                        >
                                        Nah.
                                    </button>
                                </div>`
}
const deleteTodo=(id, abort)=>{
    if(!abort){
        todos = todos.filter((a)=>a.id != id)
        createTodos()
        updateStorage()
        messageAlert("Task deleted")
    }
    deletionpopup.remove()
}
const importTodos=()=>{
    if(flags.textareaShown){
        if(importtodos.value.length > 0){
            try{
                todos = JSON.parse(importtodos.value)
                updateStorage()
                createTodos()
                messageAlert("Imported successfully")
                importtodos.style.display = "none"
                flags.textareaShown = false;
            }
            catch{
                messageAlert("Syntax error", "rgba(119, 12, 12, 0.7)")
                
            }
        }
        else{
                importtodos.style.display = "none"
                flags.textareaShown = false;
        }
    }else{
        importtodos.style.display = "block"
        importtodos.value = ""
        flags.textareaShown = true;
    }

}
const messageAlert=(text, color)=>{
    message.innerHTML = text
    message.style.animation = "none"
    message.offsetHeight
    message.style.animation = "animatemsg 1s"
    message.style.backgroundColor = typeof color == "undefined"? "rgb(12, 119, 12, 0.7)" : color
}
const resetTodoDialog=(id)=>{
    let taskToReset = "";
    for(let i in todos){
        if(todos[i].id == id){
            taskToReset = todos[i].todoName
        }
    }
    if(taskToReset.length > 13){
        console.log(taskToReset.length)
        taskToReset = taskToReset.substring(0,12)+"..."
    }
    document.body.innerHTML += `<div id="completionpopup" class="dialogi">Complete ${taskToReset}?<br>
                                    <button
                                        onclick="resetTodo(${id}, false)"
                                        >
                                        Sure.
                                    </button>
                                    <button
                                        onclick="resetTodo(${id}, true)"
                                        >
                                        Nah.
                                    </button>
                                </div>`
}
const resetTodo=(id,abort)=>{
    if(!abort){
        console.log(`ID = ${id}`)
        let now = Math.floor((new Date().getTime())/86400000)
        for(let i in todos){
            if(todos[i].id == id){
                todos[i].endDate = now + todos[i].lengthDays;
                messageAlert(`${todos[i].todoName} done!`)
                createTodos()
                updateStorage()
                break;
            }
        }
    }
    completionpopup.remove()
}


getTodos()
searchTask()
updateStorage() // add empty array to storage if no tasks added
chooseView()
</script>
